<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>村の謎 — Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=Shippori+Mincho+B1:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rust:    #7C2D12;
      --rust2:   #9A3412;
      --ember:   #C2410C;
      --gold:    #92400E;
      --cream:   #FEF3C7;
      --paper:   #FEFCE8;
      --ink:     #0C0A09;
      --fog:     #D6D3D1;
      --blood:   #450A0A;
    }

    body {
      background: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 60px 20px;
      font-family: 'Noto Serif JP', serif;
      overflow-x: hidden;
    }

    /* ─── Noise overlay ─── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    /* ═══════════════════════════════════════
       MAIN SEAL
    ═══════════════════════════════════════ */
    .seal-wrap {
      position: relative;
      z-index: 1;
      animation: floatSeal 6s ease-in-out infinite;
    }

    @keyframes floatSeal {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    .seal {
      width: 420px;
      height: 420px;
      position: relative;
    }

    /* Outer glow */
    .seal::before {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(194,65,12,0.18) 0%, transparent 70%);
      animation: pulseGlow 3s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.04); }
    }

    .seal svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 24px rgba(194,65,12,0.4)) drop-shadow(0 0 8px rgba(194,65,12,0.2));
    }

    /* ─── Rust distress SVG filter ─── */
    .rust-filter { position: absolute; width: 0; height: 0; overflow: hidden; }

    /* ═══════════════════════════════════════
       LOGOTYPE BELOW SEAL
    ═══════════════════════════════════════ */
    .logotype {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .title-jp {
      font-family: 'Shippori Mincho B1', serif;
      font-weight: 800;
      font-size: 3.2rem;
      letter-spacing: 0.35em;
      color: var(--cream);
      text-shadow: 0 0 30px rgba(194,65,12,0.6), 0 2px 4px rgba(0,0,0,0.8);
      position: relative;
    }

    .title-jp::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--ember), transparent);
    }

    .title-sub {
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.5em;
      color: var(--fog);
      text-transform: uppercase;
      opacity: 0.7;
    }

    .title-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 320px;
      margin: 4px 0;
    }
    .title-divider span {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(146,64,14,0.6), transparent);
    }
    .title-divider em {
      font-style: normal;
      font-size: 0.7rem;
      color: var(--ember);
      opacity: 0.8;
      letter-spacing: 0.2em;
    }

    /* ═══════════════════════════════════════
       VARIANT — HORIZONTAL BANNER
    ═══════════════════════════════════════ */
    .banner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 32px;
      background: linear-gradient(135deg, rgba(12,10,9,0.95) 0%, rgba(69,10,10,0.3) 50%, rgba(12,10,9,0.95) 100%);
      border: 1px solid rgba(146,64,14,0.35);
      padding: 24px 48px;
      position: relative;
      overflow: hidden;
      width: 680px;
      max-width: 100%;
    }

    .banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 60px,
        rgba(146,64,14,0.04) 60px,
        rgba(146,64,14,0.04) 61px
      );
    }

    /* Corner marks */
    .banner::after {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(146,64,14,0.2);
      pointer-events: none;
    }

    .banner-mark {
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--ember);
      border-style: solid;
      opacity: 0.6;
    }
    .banner-mark.tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
    .banner-mark.tr { top: 8px; right: 8px; border-width: 1px 1px 0 0; }
    .banner-mark.bl { bottom: 8px; left: 8px; border-width: 0 0 1px 1px; }
    .banner-mark.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

    .banner-icon {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 12px rgba(194,65,12,0.5));
    }

    .banner-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .banner-jp {
      font-family: 'Shippori Mincho B1', serif;
      font-weight: 800;
      font-size: 1.9rem;
      letter-spacing: 0.3em;
      color: var(--cream);
      text-shadow: 0 0 20px rgba(194,65,12,0.5);
      line-height: 1;
    }

    .banner-en {
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.55em;
      color: var(--fog);
      opacity: 0.65;
      text-transform: uppercase;
    }

    .banner-tag {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--ember);
      opacity: 0.8;
    }

    /* ═══════════════════════════════════════
       LABEL
    ═══════════════════════════════════════ */
    .section-label {
      position: relative;
      z-index: 1;
      font-family: 'Noto Serif JP', serif;
      font-size: 0.65rem;
      letter-spacing: 0.6em;
      color: rgba(214, 211, 209, 0.35);
      text-transform: uppercase;
      margin-bottom: -40px;
      margin-top: 20px;
    }

    /* ─── Mist lines ─── */
    .mist {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 140px;
      background: linear-gradient(to top, rgba(214,211,209,0.04) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>

  <!-- SVG Rust Filter -->
  <svg class="rust-filter" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="rust">
        <feTurbulence type="fractalNoise" baseFrequency="0.04 0.07" numOctaves="5" result="noise" />
        <feColorMatrix type="saturate" values="0" in="noise" result="gray" />
        <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blend" />
        <feComposite in="blend" in2="SourceGraphic" operator="in" />
      </filter>
    </defs>
  </svg>

  <p class="section-label">— Primary Mark —</p>

  <!-- ════ MAIN SEAL ════ -->
  <div class="seal-wrap">
    <div class="seal">
      <svg viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg" fill="none">
        <defs>
          <!-- Radial gradient for background -->
          <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#1C0A04" />
            <stop offset="70%"  stop-color="#0C0A09" />
            <stop offset="100%" stop-color="#070504" />
          </radialGradient>

          <!-- Rust ring gradient -->
          <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#9A3412" />
            <stop offset="30%"  stop-color="#C2410C" />
            <stop offset="60%"  stop-color="#7C2D12" />
            <stop offset="100%" stop-color="#92400E" />
          </linearGradient>

          <!-- Inner ring gradient -->
          <linearGradient id="innerRingGrad" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0%"   stop-color="#7C2D12" stop-opacity="0.5" />
            <stop offset="50%"  stop-color="#C2410C" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#7C2D12" stop-opacity="0.5" />
          </linearGradient>

          <!-- Glow filter -->
          <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <!-- Text path for outer ring -->
          <path id="outerArcTop"
            d="M 70,210 A 140,140 0 0 1 350,210" />
          <path id="outerArcBottom"
            d="M 76,230 A 138,138 0 0 0 344,230" />

          <!-- Noise texture -->
          <filter id="paperNoise">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
            <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
            <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="b"/>
            <feComposite in="b" in2="SourceGraphic" operator="in"/>
          </filter>
        </defs>

        <!-- Outer disc -->
        <circle cx="210" cy="210" r="200" fill="url(#bgGrad)" />

        <!-- Outer ring track (thick rust ring) -->
        <circle cx="210" cy="210" r="192" stroke="url(#ringGrad)" stroke-width="10" opacity="0.9" />

        <!-- Decorative tick marks around the ring -->
        <g stroke="#C2410C" stroke-width="1.5" opacity="0.55">
          <!-- 72 ticks, every 5 degrees -->
          <g transform="translate(210,210)">
            <!-- Long ticks every 45° -->
            <line x1="0" y1="-182" x2="0" y2="-170" transform="rotate(0)"/>
            <line x1="0" y1="-182" x2="0" y2="-170" transform="rotate(45)"/>
            <line x1="0" y1="-182" x2="0" y2="-170" transform="rotate(90)"/>
            <line x1="0" y1="-182" x2="0" y2="-170" transform="rotate(135)"/>
            <line x1="0" y1="-182" x2="0" y2="-170" transform="rotate(180)"/>
            <line x1="0" y1="-182" x2="0" y2="-170" transform="rotate(225)"/>
            <line x1="0" y1="-182" x2="0" y2="-170" transform="rotate(270)"/>
            <line x1="0" y1="-182" x2="0" y2="-170" transform="rotate(315)"/>
            <!-- Short ticks every 15° (skip 45°) -->
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(15)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(30)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(60)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(75)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(105)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(120)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(150)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(165)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(195)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(210)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(240)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(255)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(285)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(300)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(330)"/>
            <line x1="0" y1="-182" x2="0" y2="-175" stroke-width="1" transform="rotate(345)"/>
          </g>
        </g>

        <!-- Inner ring (thin) -->
        <circle cx="210" cy="210" r="160" stroke="url(#innerRingGrad)" stroke-width="1.5" opacity="0.7" />
        <circle cx="210" cy="210" r="155" stroke="#7C2D12" stroke-width="0.5" opacity="0.4" />

        <!-- Circular text — top arc: KIRIGAKURE -->
        <text font-family="'Noto Serif JP', serif" font-size="13" font-weight="400"
              letter-spacing="6" fill="#C2410C" opacity="0.9" filter="url(#glow)">
          <textPath href="#outerArcTop" startOffset="16%">霧隠れ村  ·  KIRIGAKURE  ·</textPath>
        </text>

        <!-- Circular text — bottom arc: MURA NO NAZO -->
        <text font-family="'Noto Serif JP', serif" font-size="12" font-weight="300"
              letter-spacing="4" fill="#9A3412" opacity="0.75">
          <textPath href="#outerArcBottom" startOffset="12%">·  村の謎  ·  MURA NO NAZO  ·</textPath>
        </text>

        <!-- ─── Fox silhouette (kitsune) ─── -->
        <!-- Body and tails, centered around 210,200 -->
        <g transform="translate(210,210)" filter="url(#glow)">

          <!-- Multiple tails (9 tails = corrupted kitsune) -->
          <!-- Tail spread behind fox, soft curves -->
          <g opacity="0.55" stroke="#C2410C" stroke-width="1" fill="none">
            <!-- Tail 1 center -->
            <path d="M0,10 C-10,30 -5,60 10,75" />
            <!-- Tail 2 left -->
            <path d="M0,10 C-20,25 -25,55 -15,75" />
            <!-- Tail 3 right -->
            <path d="M0,10 C10,25 20,50 22,72" />
            <!-- Tail 4 far left -->
            <path d="M-2,12 C-30,20 -42,48 -38,72" />
            <!-- Tail 5 far right -->
            <path d="M2,12 C30,18 42,44 40,70" />
          </g>

          <!-- Fox body -->
          <ellipse cx="0" cy="0" rx="28" ry="22" fill="#1C0A04" stroke="#9A3412" stroke-width="1.5" />

          <!-- Fox head -->
          <ellipse cx="0" cy="-34" rx="22" ry="20" fill="#1C0A04" stroke="#C2410C" stroke-width="1.5" />

          <!-- Ears -->
          <polygon points="-18,-48 -8,-66 -4,-48" fill="#1C0A04" stroke="#C2410C" stroke-width="1.5" />
          <polygon points="18,-48 8,-66 4,-48" fill="#1C0A04" stroke="#C2410C" stroke-width="1.5" />
          <!-- Ear inner -->
          <polygon points="-16,-50 -10,-62 -6,-50" fill="#450A0A" opacity="0.7"/>
          <polygon points="16,-50 10,-62 6,-50" fill="#450A0A" opacity="0.7"/>

          <!-- Eyes -->
          <ellipse cx="-9" cy="-34" rx="4.5" ry="3.5" fill="#C2410C" />
          <ellipse cx="9"  cy="-34" rx="4.5" ry="3.5" fill="#C2410C" />
          <!-- Eye glow -->
          <ellipse cx="-9" cy="-34" rx="4.5" ry="3.5" fill="#FEF3C7" opacity="0.25" />
          <ellipse cx="9"  cy="-34" rx="4.5" ry="3.5" fill="#FEF3C7" opacity="0.25" />
          <!-- Pupils -->
          <ellipse cx="-9" cy="-34" rx="1.8" ry="3" fill="#0C0A09" />
          <ellipse cx="9"  cy="-34" rx="1.8" ry="3" fill="#0C0A09" />

          <!-- Muzzle -->
          <ellipse cx="0" cy="-28" rx="6" ry="4" fill="#2A1008" stroke="#7C2D12" stroke-width="0.8" />
          <!-- Nose -->
          <ellipse cx="0" cy="-30" rx="2.5" ry="1.8" fill="#7C2D12" />

          <!-- Fox mask — markings -->
          <path d="M-20,-38 Q-14,-30 -9,-34" stroke="#C2410C" stroke-width="0.8" fill="none" opacity="0.6"/>
          <path d="M20,-38 Q14,-30 9,-34" stroke="#C2410C" stroke-width="0.8" fill="none" opacity="0.6"/>

          <!-- Forehead mark (spiritual seal) -->
          <text x="0" y="-46" text-anchor="middle" font-family="'Noto Serif JP'" font-size="8"
                fill="#C2410C" opacity="0.8">封</text>

          <!-- Sitting paws -->
          <ellipse cx="-18" cy="18" rx="8" ry="5" fill="#1C0A04" stroke="#9A3412" stroke-width="1" />
          <ellipse cx="18" cy="18" rx="8" ry="5" fill="#1C0A04" stroke="#9A3412" stroke-width="1" />
        </g>

        <!-- Center kanji — 謎 (Mystery) below fox -->
        <text x="210" y="298"
              text-anchor="middle"
              font-family="'Shippori Mincho B1', serif"
              font-size="42"
              font-weight="800"
              fill="#FEF3C7"
              opacity="0.92"
              filter="url(#glow)"
              letter-spacing="8">霧隠</text>

        <!-- Subtitle kanji — small -->
        <text x="210" y="322"
              text-anchor="middle"
              font-family="'Noto Serif JP', serif"
              font-size="11"
              font-weight="300"
              fill="#C2410C"
              opacity="0.7"
              letter-spacing="12">村の謎</text>

        <!-- Horizontal rule lines beside kanji -->
        <line x1="82" y1="300" x2="142" y2="300" stroke="#7C2D12" stroke-width="0.8" opacity="0.6" />
        <line x1="278" y1="300" x2="338" y2="300" stroke="#7C2D12" stroke-width="0.8" opacity="0.6" />

        <!-- Diamond ornaments -->
        <polygon points="210,340 215,347 210,354 205,347" fill="none" stroke="#9A3412" stroke-width="1" opacity="0.5"/>

        <!-- Center inner circle outline -->
        <circle cx="210" cy="210" r="90" stroke="#7C2D12" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.35"/>

        <!-- Distress dots / rust spots scattered -->
        <g fill="#7C2D12" opacity="0.25">
          <circle cx="140" cy="155" r="2.5" />
          <circle cx="290" cy="270" r="2" />
          <circle cx="155" cy="280" r="1.5" />
          <circle cx="280" cy="148" r="2" />
          <circle cx="168" cy="200" r="1" />
          <circle cx="258" cy="215" r="1.5" />
        </g>

        <!-- Outer vignette -->
        <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
          <stop offset="75%"  stop-color="transparent" />
          <stop offset="100%" stop-color="#0C0A09" stop-opacity="0.7" />
        </radialGradient>
        <circle cx="210" cy="210" r="200" fill="url(#vignette)" />
      </svg>
    </div>
  </div>

  <!-- ════ LOGOTYPE ════ -->
  <div class="logotype">
    <div class="title-jp">村の謎</div>
    <div class="title-divider">
      <span></span>
      <em>Minecraft Roleplay</em>
      <span></span>
    </div>
    <div class="title-sub">Mura no Nazo &nbsp;·&nbsp; คิริกาคุเระ</div>
  </div>

  <p class="section-label" style="margin-top:20px">— Horizontal Banner —</p>

  <!-- ════ BANNER VARIANT ════ -->
  <div class="banner" style="position:relative; z-index:1;">
    <div class="banner-mark tl"></div>
    <div class="banner-mark tr"></div>
    <div class="banner-mark bl"></div>
    <div class="banner-mark br"></div>

    <!-- Mini fox icon -->
    <svg class="banner-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
      <defs>
        <filter id="glow2">
          <feGaussianBlur stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Tails -->
      <g stroke="#C2410C" stroke-width="1.2" fill="none" opacity="0.6">
        <path d="M50,58 C44,72 48,88 56,94"/>
        <path d="M50,58 C38,68 36,84 42,94"/>
        <path d="M50,58 C62,65 66,82 60,94"/>
      </g>
      <!-- Body -->
      <ellipse cx="50" cy="54" rx="18" ry="14" fill="#1C0A04" stroke="#9A3412" stroke-width="1.5"/>
      <!-- Head -->
      <ellipse cx="50" cy="34" rx="15" ry="13" fill="#1C0A04" stroke="#C2410C" stroke-width="1.5" filter="url(#glow2)"/>
      <!-- Ears -->
      <polygon points="38,23 44,10 47,23" fill="#1C0A04" stroke="#C2410C" stroke-width="1.2"/>
      <polygon points="62,23 56,10 53,23" fill="#1C0A04" stroke="#C2410C" stroke-width="1.2"/>
      <!-- Eyes -->
      <ellipse cx="43" cy="34" rx="3.5" ry="2.8" fill="#C2410C"/>
      <ellipse cx="57" cy="34" rx="3.5" ry="2.8" fill="#C2410C"/>
      <ellipse cx="43" cy="34" rx="1.3" ry="2.4" fill="#0C0A09"/>
      <ellipse cx="57" cy="34" rx="1.3" ry="2.4" fill="#0C0A09"/>
      <!-- Seal mark -->
      <text x="50" y="28" text-anchor="middle" font-family="serif" font-size="6" fill="#C2410C" opacity="0.9">封</text>
    </svg>

    <div class="banner-text">
      <div class="banner-jp">村の謎</div>
      <div class="banner-en">Mura no Nazo · Kirigakure Village</div>
      <div class="banner-tag">หมู่บ้านลี้ลับ · Minecraft Roleplay Project</div>
    </div>
  </div>

  <div class="mist"></div>

</body>
</html>
